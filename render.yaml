services:
  - type: web
    name: sanos-y-salvos-ms-seguridad
    env: python
    plan: free
    rootDir: ms_seguridad
    buildCommand: pip install -r ../requirements.txt
    startCommand: python manage.py migrate && gunicorn ms_seguridad.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false

